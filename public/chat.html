<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task List — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #B4471F; --mine: #F3E6DD; }
    * { box-sizing: border-box; }
    body { margin: 0; height: 100vh; overflow: hidden; background: #F7F5F0; color: #1B1A17;
      font-family: 'Instrument Sans', system-ui, sans-serif; }
    button, input, textarea { font-family: inherit; }
    .app { display: flex; height: 100vh; }

    /* sidebar */
    .side { width: 320px; border-right: 1px solid #E6E2D8; background: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
    .side-hd { padding: 16px 18px; border-bottom: 1px solid #F0ECE3; display: flex; align-items: center; justify-content: space-between; }
    .side-hd h1 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; margin: 0; }
    .side-hd a { text-decoration: none; font-size: 13px; font-weight: 600; color: #78715F; border: 1px solid #E2DDD1; padding: 6px 10px; border-radius: 9px; }
    .search { padding: 10px 14px; border-bottom: 1px solid #F0ECE3; }
    .search input { width: 100%; border: 1px solid #E2DDD1; background: #F7F5F0; border-radius: 9px; padding: 8px 11px; font-size: 13.5px; outline: none; }
    .contacts { flex: 1; overflow-y: auto; }
    .contact { display: flex; align-items: center; gap: 11px; padding: 11px 16px; cursor: pointer; border-bottom: 1px solid #F5F2EB; }
    .contact:hover { background: #FBFAF7; }
    .contact.on { background: #F3EEE6; }
    .av { width: 40px; height: 40px; border-radius: 12px; color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .c-main { flex: 1; min-width: 0; }
    .c-top { display: flex; justify-content: space-between; gap: 8px; }
    .c-name { font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .c-time { font-size: 11px; color: #B4AD9C; flex-shrink: 0; }
    .c-bot { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-top: 2px; }
    .c-last { font-size: 12.5px; color: #A19A8B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .c-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; min-width: 19px; height: 19px; border-radius: 99px; display: flex; align-items: center; justify-content: center; padding: 0 5px; flex-shrink: 0; }

    /* thread */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .empty-main { flex: 1; display: flex; align-items: center; justify-content: center; color: #B4AD9C; font-size: 15px; }
    .thread-hd { display: flex; align-items: center; gap: 12px; padding: 13px 20px; background: #fff; border-bottom: 1px solid #E6E2D8; }
    .thread-hd .name { font-size: 16px; font-weight: 600; }
    .thread-hd .status { font-size: 12px; color: #A19A8B; height: 15px; }
    .thread-hd .status.typing { color: var(--accent); font-weight: 600; }
    .back { display: none; border: none; background: none; font-size: 20px; cursor: pointer; color: #5C554A; }
    .msgs { flex: 1; overflow-y: auto; padding: 18px 8vw; display: flex; flex-direction: column; gap: 3px; }
    @media (max-width: 900px) { .msgs { padding: 16px 20px; } }
    .divider { align-self: center; background: #ECE8DE; color: #78715F; font-size: 11.5px; font-weight: 600; padding: 4px 12px; border-radius: 99px; margin: 12px 0 8px; }
    .row { display: flex; margin-top: 2px; }
    .row.mine { justify-content: flex-end; }
    .bubble { max-width: 76%; background: #fff; border: 1px solid #EDE8DE; border-radius: 12px; padding: 8px 11px 6px; position: relative; }
    .row.mine .bubble { background: var(--mine); border-color: #EAD9CC; }
    .fwd { font-size: 11px; color: #A19A8B; font-style: italic; margin-bottom: 2px; }
    .txt { font-size: 14px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
    .txt.deleted { color: #B4AD9C; font-style: italic; }
    .meta { font-size: 10.5px; color: #B4AD9C; text-align: right; margin-top: 3px; display: flex; gap: 5px; justify-content: flex-end; align-items: center; }
    .tick { color: #4FA972; font-weight: 700; }
    .acts { position: absolute; top: -10px; right: 8px; display: none; gap: 2px; background: #fff; border: 1px solid #E6E2D8; border-radius: 8px; box-shadow: 0 4px 12px -6px rgba(40,34,20,.3); }
    .bubble:hover .acts { display: flex; }
    .acts button { border: none; background: none; padding: 4px 7px; cursor: pointer; font-size: 12px; color: #5C554A; }
    .acts button:hover { background: #F5F2EB; }
    /* shared task card */
    .taskcard { border: 1px solid #E2DDD1; border-radius: 10px; background: #FBFAF7; padding: 9px 11px; margin-bottom: 4px; }
    .taskcard .tt { font-size: 13.5px; font-weight: 600; }
    .taskcard .tm { font-size: 11.5px; color: #A19A8B; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip { font-size: 10.5px; font-weight: 600; padding: 1px 7px; border-radius: 99px; }

    /* composer */
    .composer { display: flex; align-items: flex-end; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #E6E2D8; }
    .composer textarea { flex: 1; resize: none; max-height: 120px; border: 1px solid #E2DDD1; background: #F7F5F0; border-radius: 12px; padding: 10px 13px; font-size: 14px; outline: none; }
    .iconbtn { border: 1px solid #E2DDD1; background: #fff; width: 42px; height: 42px; border-radius: 12px; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .sendbtn { border: none; background: var(--accent); color: #fff; width: 42px; height: 42px; border-radius: 12px; font-size: 18px; cursor: pointer; flex-shrink: 0; }

    /* modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(20,16,8,.35); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal-bg.on { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 420px; max-width: 92vw; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 30px 70px -25px rgba(20,16,8,.5); }
    .modal-hd { padding: 14px 18px; border-bottom: 1px solid #F0ECE3; display: flex; justify-content: space-between; align-items: center; }
    .modal-hd b { font-size: 15px; }
    .modal-hd button { border: none; background: #F1EEE6; border-radius: 8px; width: 26px; height: 26px; cursor: pointer; }
    .modal-list { overflow-y: auto; padding: 6px; }
    .pick { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; }
    .pick:hover { background: #F5F2EB; }
    .pick .pn { font-size: 14px; font-weight: 600; }
    .pick .ps { font-size: 12px; color: #A19A8B; }
    .grp { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #A19A8B; padding: 10px 12px 4px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="side-hd"><h1>Chat</h1><a href="/">← Board</a></div>
      <div class="search"><input id="search" placeholder="Search people…"></div>
      <div class="contacts" id="contacts"></div>
    </aside>
    <main class="main">
      <div class="empty-main" id="empty">Select someone to start chatting</div>
      <div id="thread" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div class="thread-hd">
          <button class="back" id="back">←</button>
          <div class="av" id="peer-av"></div>
          <div style="min-width:0;">
            <div class="name" id="peer-name"></div>
            <div class="status" id="peer-status"></div>
          </div>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="composer">
          <button class="iconbtn" id="attach" title="Share a task">📎</button>
          <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
          <button class="sendbtn" id="send" title="Send">➤</button>
        </div>
      </div>
    </main>
  </div>

  <!-- forward / share modal -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-hd"><b id="modal-title">Forward to…</b><button id="modal-x">✕</button></div>
      <div class="modal-list" id="modal-list"></div>
    </div>
  </div>

  <script src="./chat.js"></script>
</body>
</html>
