<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task List — Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #B4471F; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #F7F5F0; color: #1B1A17;
      font-family: 'Instrument Sans', system-ui, sans-serif; }
    input, select, button, textarea { font-family: inherit; }
    select option { color: #1B1A17; }
    ::placeholder { color: #B4AD9C; }
    button { cursor: pointer; }
    h1, h2 { font-family: 'Space Grotesk', sans-serif; margin: 0; }

    .wrap { max-width: 1060px; margin: 0 auto; padding: 44px 24px 96px;
      display: flex; flex-direction: column; gap: 22px; }

    /* header */
    .topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #A19A8B; }
    .title { font-size: 36px; font-weight: 700; letter-spacing: -.02em; line-height: 1.02; }
    .rightstat { display: flex; align-items: center; gap: 18px; }
    .progwrap { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .prognum { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
    .progtrack { width: 172px; height: 7px; border-radius: 99px; background: #E6E2D8; overflow: hidden; }
    .progfill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .4s ease; }

    /* bell */
    .bell { position: relative; }
    .bellbtn { width: 44px; height: 44px; border-radius: 12px; border: 1px solid #E2DDD1; background: #fff;
      font-size: 19px; display: inline-flex; align-items: center; justify-content: center; color: #5C554A; }
    .bellbtn:hover { background: #FBFAF7; }
    .badge { position: absolute; top: -6px; right: -6px; min-width: 20px; height: 20px; padding: 0 5px;
      border-radius: 99px; background: #D24B3E; color: #fff; font-size: 11px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; border: 2px solid #F7F5F0; }
    .panel { position: absolute; right: 0; top: 52px; width: 360px; max-width: 88vw; z-index: 40;
      background: #fff; border: 1px solid #EAE6DC; border-radius: 14px; overflow: hidden;
      box-shadow: 0 20px 48px -20px rgba(40,34,20,.4); }
    .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid #F0ECE3; }
    .panel-list { max-height: 60vh; overflow-y: auto; }
    .notif { display: flex; gap: 11px; padding: 12px 16px; border-bottom: 1px solid #F5F2EB; }
    .notif.unread { background: #FBF6EF; }
    .ndot { width: 8px; height: 8px; border-radius: 99px; margin-top: 6px; flex-shrink: 0; }
    .ntitle { font-size: 13.5px; font-weight: 600; line-height: 1.3; }
    .nbody { font-size: 12.5px; color: #A19A8B; margin-top: 2px; }
    .ntime { font-size: 11px; color: #C0B9A8; margin-top: 3px; }
    .link { background: none; border: none; color: var(--accent); font-size: 13px; font-weight: 600; padding: 0; }

    /* tabs / chips */
    .tabs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid #E6E2D8; }
    .pill { display: inline-flex; align-items: center; gap: 8px; border: 1px solid #E2DDD1; background: #fff;
      color: #5C554A; font-size: 14px; font-weight: 600; padding: 8px 14px; border-radius: 99px; }
    .pill .dot { width: 8px; height: 8px; border-radius: 99px; }
    .pill.dashed { border-style: dashed; border-color: #CDC7B7; background: transparent; color: #78715F; }
    .ai-tag { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 99px; background: #F1ECFB; color: #6D4FCF; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 7px; border: 1px solid #E2DDD1; background: #fff;
      color: #5C554A; font-size: 13.5px; font-weight: 600; padding: 7px 12px; border-radius: 99px; }
    .chip .dot { width: 8px; height: 8px; border-radius: 99px; }
    .chip .count { font-weight: 500; opacity: .6; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .seg { display: inline-flex; background: #ECE8DE; border-radius: 10px; padding: 3px; }
    .seg button { border: none; background: transparent; color: #8C8574; font-size: 13.5px; font-weight: 600;
      padding: 6px 14px; border-radius: 8px; }
    .seg button.on { background: #fff; color: #1B1A17; box-shadow: 0 1px 3px rgba(40,34,20,.14); }
    .btn-dark { font-size: 14px; font-weight: 600; color: #fff; background: #1B1A17; border: none; border-radius: 10px; padding: 9px 16px; }
    .btn-accent { font-size: 14px; font-weight: 600; color: #fff; background: var(--accent); border: none; border-radius: 9px; padding: 10px 18px; }
    .btn-ai { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600;
      color: #6D4FCF; background: #F1ECFB; border: 1px solid #E1D7F7; border-radius: 10px; padding: 9px 14px; }
    .btn-ghost { font-size: 14px; font-weight: 600; color: #A19A8B; background: none; border: none; }

    .composer { display: flex; flex-direction: column; gap: 12px; background: #fff; border: 1px solid #EAE6DC;
      border-radius: 14px; padding: 16px; box-shadow: 0 8px 24px -18px rgba(40,34,20,.25); }
    .composer.row { flex-direction: row; align-items: center; gap: 10px; flex-wrap: wrap; padding: 14px 16px; }
    .fld { font-size: 14px; font-weight: 500; color: #1B1A17; background: #F7F5F0; border: 1px solid #E2DDD1;
      border-radius: 9px; padding: 10px 13px; outline: none; }
    .fld.title { font-size: 16px; font-weight: 600; width: 100%; padding: 11px 13px; }
    select.fld { font-weight: 600; cursor: pointer; padding: 9px 12px; }

    /* list */
    .stack { display: flex; flex-direction: column; gap: 18px; }
    .card { background: #fff; border: 1px solid #EAE6DC; border-radius: 16px; overflow: hidden;
      box-shadow: 0 1px 2px rgba(40,34,20,.03), 0 8px 24px -18px rgba(40,34,20,.18); }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 22px; border-bottom: 1px solid #F0ECE3; }
    .proj-bar { width: 10px; height: 32px; border-radius: 4px; flex-shrink: 0; }
    .proj-name { font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
    .proj-sub { font-size: 13px; color: #A19A8B; font-weight: 500; }
    .mini-track { width: 76px; height: 6px; border-radius: 99px; background: #EEEAE0; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
    ul.tasks { list-style: none; margin: 0; padding: 6px 0; }
    .row-task { display: flex; align-items: center; gap: 14px; padding: 11px 22px; border-bottom: 1px solid #F5F2EB; }
    .check { width: 21px; height: 21px; flex-shrink: 0; border-radius: 99px; border: 1.75px solid #D2CCBD;
      background: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; line-height: 1; padding: 0; }
    .t-title { flex: 1; min-width: 0; font-size: 15px; font-weight: 500; line-height: 1.35; }
    .status-tag { font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 99px; flex-shrink: 0; }
    .due { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .due .pdot { width: 7px; height: 7px; border-radius: 99px; }
    .due .txt { font-size: 12.5px; color: #A19A8B; font-weight: 500; min-width: 48px; text-align: right; }
    .role-tag { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; padding: 4px 9px;
      border-radius: 99px; flex-shrink: 0; min-width: 74px; justify-content: center; }
    .del { border: none; background: none; color: #CDC7B7; font-size: 15px; padding: 2px 4px; flex-shrink: 0; }
    .del:hover { color: #D24B3E; }
    .empty { padding: 20px 22px; font-size: 14px; color: #B4AD9C; font-style: italic; }

    /* kanban */
    .kboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
    .kcol { display: flex; flex-direction: column; gap: 12px; background: #F1EEE6; border: 1px solid #E6E2D8;
      border-radius: 16px; padding: 14px; min-height: 140px; }
    .kcol-head { display: flex; align-items: center; gap: 9px; padding: 2px 4px; }
    .kcol-head .name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; }
    .kcol-head .cnt { font-size: 12px; font-weight: 600; color: #A19A8B; }
    .kcard { display: flex; flex-direction: column; gap: 9px; background: #fff; border: 1px solid #EAE6DC;
      border-radius: 12px; padding: 12px 13px; box-shadow: 0 1px 2px rgba(40,34,20,.04); }
    .kproj { font-size: 11.5px; font-weight: 600; color: #A19A8B; text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kmove { width: 24px; height: 24px; border-radius: 7px; border: 1px solid #E6E2D8; background: #FBFAF7;
      font-size: 13px; line-height: 1; padding: 0; color: #78715F; }

    /* toast */
    .toasts { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 60; }
    .toast { display: flex; gap: 10px; align-items: flex-start; background: #1B1A17; color: #fff; padding: 12px 15px;
      border-radius: 12px; box-shadow: 0 12px 30px -12px rgba(0,0,0,.5); max-width: 320px;
      animation: slidein .25s ease; }
    .toast .tdot { width: 8px; height: 8px; border-radius: 99px; margin-top: 5px; flex-shrink: 0; }
    .toast .tt { font-size: 13.5px; font-weight: 600; }
    .toast .tb { font-size: 12px; opacity: .7; margin-top: 2px; }
    @keyframes slidein { from { transform: translateX(16px); opacity: 0; } to { transform: none; opacity: 1; } }

    .live { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: #A19A8B; }
    .live .ldot { width: 8px; height: 8px; border-radius: 99px; background: #2A8062; }
    .live.off .ldot { background: #D24B3E; }

    /* user chip */
    .userchip { display: inline-flex; align-items: center; gap: 9px; background: #fff; border: 1px solid #E2DDD1;
      border-radius: 12px; padding: 6px 10px 6px 7px; }
    .uavatar { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); color: #fff;
      font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; }
    .uemail { font-size: 13px; font-weight: 600; color: #5C554A; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout { border: none; background: #F1EEE6; color: #78715F; font-size: 12.5px; font-weight: 600; padding: 5px 10px; border-radius: 8px; }
    .logout:hover { background: #E9E4DA; color: #1B1A17; }

    /* auth screen */
    .authwrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .authcard { width: 100%; max-width: 400px; background: #fff; border: 1px solid #EAE6DC; border-radius: 18px;
      padding: 32px 30px; box-shadow: 0 20px 60px -30px rgba(40,34,20,.4); display: flex; flex-direction: column; gap: 12px; }
    .autheyebrow { font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #A19A8B; }
    .authtitle { font-size: 30px; font-weight: 700; letter-spacing: -.02em; }
    .authsub { margin: 0 0 6px; font-size: 14px; color: #A19A8B; }
    .authfld { width: 100%; font-size: 15px; padding: 12px 13px; }
    .authbtn { width: 100%; padding: 12px; font-size: 15px; margin-top: 4px; }
    .authtoggle { display: flex; gap: 6px; justify-content: center; font-size: 13.5px; color: #A19A8B; margin-top: 4px; }
    .autherr { background: #FBEBE9; color: #C13A2C; border: 1px solid #F3D3CE; border-radius: 9px; padding: 9px 12px; font-size: 13px; }

    @media (max-width: 720px) { .kboard { grid-template-columns: 1fr; } .title { font-size: 30px; } .uemail { display: none; } }
  </style>
</head>
<body>
  <!-- Auth screen (shown when logged out) -->
  <div id="auth" class="authwrap" style="display:none">
    <div class="authcard">
      <span class="autheyebrow">My Workspace</span>
      <h1 class="authtitle">Task list</h1>
      <p class="authsub" id="auth-sub">Sign in to your workspace</p>
      <div id="auth-error" class="autherr" style="display:none"></div>
      <input id="auth-name" class="fld authfld" placeholder="Your name" style="display:none">
      <input id="auth-email" class="fld authfld" type="email" placeholder="you@example.com" autocomplete="email">
      <input id="auth-pass" class="fld authfld" type="password" placeholder="Password" autocomplete="current-password">
      <button id="auth-submit" class="btn-accent authbtn">Sign in</button>
      <div class="authtoggle">
        <span id="auth-toggle-text">New here?</span>
        <button id="auth-toggle" class="link">Create an account</button>
      </div>
    </div>
  </div>

  <div class="wrap" id="app" style="display:none">
    <div class="topbar">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <span class="eyebrow">My Workspace</span>
        <h1 class="title">Task list</h1>
        <span id="live" class="live"><span class="ldot"></span> Connecting…</span>
      </div>
      <div class="rightstat">
        <div class="progwrap">
          <div style="display:flex;align-items:baseline;gap:8px;">
            <span id="ov-done" class="prognum">0</span>
            <span style="font-size:15px;color:#A19A8B;font-weight:500;">/ <span id="ov-total">0</span> done</span>
          </div>
          <div class="progtrack"><div id="ov-fill" class="progfill" style="width:0%"></div></div>
        </div>
        <a href="/chat.html" class="bellbtn" title="Chat" style="text-decoration:none;position:relative;">💬<span id="chat-badge" class="badge" style="display:none">0</span></a>
        <a href="/admin.html" class="bellbtn" title="Dashboard" style="text-decoration:none;">📊</a>
        <button id="soundbtn" class="bellbtn" title="Sound alerts: on">🔊</button>
        <div class="bell">
          <button id="bellbtn" class="bellbtn" title="Notifications">🔔<span id="badge" class="badge" style="display:none">0</span></button>
          <div id="panel" class="panel" style="display:none">
            <div class="panel-head">
              <strong style="font-size:14px;">Notifications</strong>
              <button id="markall" class="link">Mark all read</button>
            </div>
            <div id="panel-list" class="panel-list"></div>
          </div>
        </div>
        <div class="userchip" id="userchip" style="display:none">
          <span class="uavatar" id="uavatar"></span>
          <span class="uemail" id="uemail"></span>
          <button class="logout" id="logout" title="Log out">Log out</button>
        </div>
      </div>
    </div>

    <div id="tabs" class="tabs"></div>

    <div id="proj-composer"></div>

    <div class="toolbar">
      <div id="chips" class="chips"></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="seg">
          <button id="view-list" class="on">☰ List</button>
          <button id="view-kanban">▦ Kanban</button>
        </div>
        <button id="add-task" class="btn-dark">+ Add task</button>
        <button id="ai-task" class="btn-ai">✦ AI task</button>
      </div>
    </div>

    <div id="task-composer"></div>

    <div id="board"></div>
  </div>

  <div id="toasts" class="toasts"></div>
  <script src="./app.js"></script>
</body>
</html>
